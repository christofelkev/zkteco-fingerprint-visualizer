<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<title>ZKTeco Template Visualizer</title>
<style>
body{font-family:Arial,sans-serif;background:#f3f3f3;margin:24px}
textarea{width:100%;height:150px;font-family:monospace}
button{padding:10px 16px;margin:10px 5px 15px 0;cursor:pointer}
.wrap{display:flex;gap:18px;flex-wrap:wrap}
.panel{background:white;padding:14px;border:1px solid #ccc}
canvas{background:white;border:1px solid #ddd}
.note{font-size:14px;color:#666}
</style>
</head>
<body>

<h2>ZKTeco Fingerprint Template Visualizer</h2>

<p class="note">
Ini bukan rekonstruksi sidik jari asli. Ini pseudo-visual konsisten dari template.
</p>

<textarea id="tpl" placeholder="Paste template Base64 ZKTeco di sini..."></textarea>
<br>

<button onclick="generate()">Generate</button>
<button onclick="downloadCanvas('recon','rekonstruksi.png')">Download Rekonstruksi</button>
<button onclick="downloadCanvas('mini','minutiae.png')">Download Minutiae</button>

<div class="wrap">
  <div class="panel">
    <h3>Rekonstruksi Pola Sidik Jari</h3>
    <canvas id="recon" width="520" height="620"></canvas>
  </div>

  <div class="panel">
    <h3>Minutiae Points</h3>
    <canvas id="mini" width="520" height="620"></canvas>
  </div>
</div>

<script>
async function sha256Bytes(text){
  const data = new TextEncoder().encode(text);
  const hash = await crypto.subtle.digest("SHA-256", data);
  return Array.from(new Uint8Array(hash));
}

function makeRng(bytes){
  let seed = 2166136261;
  for(const b of bytes){
    seed ^= b;
    seed = Math.imul(seed, 16777619);
  }

  return function(){
    seed += 0x6D2B79F5;
    let t = seed;
    t = Math.imul(t ^ t >>> 15, t | 1);
    t ^= t + Math.imul(t ^ t >>> 7, t | 61);
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  }
}

function clearCanvas(ctx,w,h){
  ctx.clearRect(0,0,w,h);
  ctx.fillStyle = "#fff";
  ctx.fillRect(0,0,w,h);
}

function drawRidges(ctx, rand, light=false){
  const cx = 260;
  const cy = 310;

  ctx.lineCap = "round";
  ctx.lineJoin = "round";

  for(let r=18; r<=215; r+=8){
    ctx.beginPath();

    ctx.lineWidth = light ? 1.1 : 2.2;
    ctx.strokeStyle = light ? "rgba(0,0,0,0.16)" : "rgba(10,10,10,0.72)";

    for(let i=0;i<=420;i++){
      const a = i / 420 * Math.PI * 2;

      const fingerprintCurve =
        Math.sin(a * 3 + r * 0.05) * 6 +
        Math.sin(a * 7 + r * 0.025) * 2.5;

      const corePull = Math.sin(a - 1.2) * Math.max(0, 70-r) * 0.18;

      const rr = r + fingerprintCurve + corePull;

      const x = cx + Math.cos(a) * rr * 0.82;
      const y = cy + Math.sin(a) * rr * 1.18;

      if(i===0) ctx.moveTo(x,y);
      else ctx.lineTo(x,y);
    }

    ctx.stroke();
  }

  // core spiral tengah
  ctx.beginPath();
  ctx.strokeStyle = light ? "rgba(0,0,0,0.18)" : "rgba(10,10,10,0.78)";
  ctx.lineWidth = light ? 1.2 : 2.4;

  for(let t=0;t<Math.PI*5.5;t+=0.05){
    const rr = 5 + t * 3.1;
    const x = cx + Math.cos(t) * rr * 0.9;
    const y = cy + Math.sin(t) * rr * 1.05;
    if(t===0) ctx.moveTo(x,y);
    else ctx.lineTo(x,y);
  }

  ctx.stroke();

  // noise putus-putus biar lebih natural
  if(!light){
    for(let i=0;i<450;i++){
      if(rand() < 0.5) continue;
      const a = rand() * Math.PI * 2;
      const r = 25 + rand() * 210;
      const x = cx + Math.cos(a) * r * 0.82;
      const y = cy + Math.sin(a) * r * 1.18;

      ctx.fillStyle = "rgba(255,255,255,0.55)";
      ctx.fillRect(x,y,2+rand()*5,1+rand()*2);
    }
  }

  return {cx,cy};
}

function drawMinutiae(ctx, rand, cx, cy){
  for(let i=0;i<90;i++){
    const a = rand() * Math.PI * 2;
    const r = 28 + rand() * 205;

    const x = cx + Math.cos(a) * r * 0.82;
    const y = cy + Math.sin(a) * r * 1.18;

    if(x<40 || x>480 || y<45 || y>530) continue;

    const bif = rand() > 0.72;

    ctx.strokeStyle = bif ? "red" : "limegreen";
    ctx.lineWidth = 1.8;

    ctx.beginPath();
    ctx.arc(x,y,4.5,0,Math.PI*2);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(x,y);
    ctx.lineTo(x + Math.cos(a)*15, y + Math.sin(a)*15);
    ctx.stroke();

    if(bif){
      ctx.beginPath();
      ctx.moveTo(x,y);
      ctx.lineTo(x + Math.cos(a+0.55)*13, y + Math.sin(a+0.55)*13);
      ctx.stroke();
    }
  }

  ctx.font = "14px Arial";
  ctx.fillStyle = "#333";

  ctx.strokeStyle = "limegreen";
  ctx.beginPath();
  ctx.arc(50,565,7,0,Math.PI*2);
  ctx.stroke();
  ctx.fillText("Ridge Ending",70,570);

  ctx.strokeStyle = "red";
  ctx.beginPath();
  ctx.arc(50,595,7,0,Math.PI*2);
  ctx.stroke();
  ctx.fillText("Bifurcation",70,600);
}

async function generate(){
  const template = document.getElementById("tpl").value.trim();

  if(!template){
    alert("Paste template dulu.");
    return;
  }

  const bytes = await sha256Bytes(template);

  const recon = document.getElementById("recon");
  const mini = document.getElementById("mini");

  const rctx = recon.getContext("2d");
  const mctx = mini.getContext("2d");

  clearCanvas(rctx,520,620);
  clearCanvas(mctx,520,620);

  const rand1 = makeRng(bytes);
  drawRidges(rctx, rand1, false);

  rctx.fillStyle = "#555";
  rctx.font = "13px Arial";
  rctx.fillText("Pseudo reconstruction from template hash",18,600);

  const rand2 = makeRng(bytes);
  const pos = drawRidges(mctx, rand2, true);
  drawMinutiae(mctx, rand2, pos.cx, pos.cy);

  mctx.fillStyle = "#555";
  mctx.font = "13px Arial";
  mctx.fillText("Pseudo minutiae map from template hash",18,545);
}

function downloadCanvas(id, filename){
  const canvas = document.getElementById(id);
  const link = document.createElement("a");
  link.download = filename;
  link.href = canvas.toDataURL("image/png");
  link.click();
}
</script>

</body>
</html>
