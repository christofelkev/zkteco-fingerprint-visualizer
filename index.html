<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ZKTeco Template Visualizer</title>
  
  <!-- Google Fonts: Inter for clean typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <main class="container">
    <div class="header-section">
      <h2>ZKTeco Fingerprint Template Visualizer</h2>
      <p class="note">Ini bukan rekonstruksi sidik jari asli. Ini pseudo-visual konsisten dari template.</p>
    </div>

    <div id="alert-container"></div>

    <div class="control-panel">
      <div class="row justify-content-center">
        <div class="col-lg-10">
          <div class="card">
            <div class="card-body flex-column">
              <textarea id="tpl" class="form-control mb-3" rows="4" placeholder="Paste template Base64 ZKTeco di sini..."></textarea>
              <div class="d-flex flex-wrap gap-2">
                <button id="btn-generate" class="btn btn-primary px-4">Generate</button>
                <button id="btn-download-recon" class="btn btn-outline-secondary">Download Rekonstruksi</button>
                <button id="btn-download-mini" class="btn btn-outline-secondary">Download Minutiae</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="row justify-content-center g-4">
      <div class="col-lg-5 col-md-6">
        <div class="card h-100">
          <div class="card-header">
            <h3>Rekonstruksi Pola Sidik Jari</h3>
          </div>
          <div class="card-body">
            <canvas id="recon" width="520" height="620"></canvas>
          </div>
        </div>
      </div>

      <div class="col-lg-5 col-md-6">
        <div class="card h-100">
          <div class="card-header">
            <h3>Minutiae Points</h3>
          </div>
          <div class="card-body">
            <canvas id="mini" width="520" height="620"></canvas>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Bootstrap JS (for dismissible alerts) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
  
  <!-- MVC App Entry Point -->
  <script type="module" src="js/app.js"></script>

</body>
</html>
